<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Frankfurter Mietspiegel 2026</title>
<style>
:root {
  --red:#b10021;
  --red2:#7d0017;
  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#222;
  --muted:#666;
  --line:#e5e5e5;
}
* { box-sizing:border-box; }
body {
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
header {
  background:linear-gradient(135deg,var(--red),var(--red2));
  color:#fff;
  padding:18px 0;
}
.wrap {
  max-width:1200px;
  margin:auto;
  padding:16px;
}
.hero {
  display:flex;
  align-items:center;
  gap:14px;
}
.wappen {
  width:120px;
  flex:none;
}
.wappen img {
  width:100%;
  height:auto;
  display:block;
}
h1 {
  margin:0;
  font-size:clamp(1.75rem,4vw,2.65rem);
}
.subtitle {
  margin-top:4px;
  opacity:.95;
}
.grid {
  display:grid;
  grid-template-columns:minmax(0,1.3fr) minmax(300px,.7fr);
  gap:16px;
  align-items:start;
}
.card {
  background:var(--card);
  border-radius:18px;
  padding:16px;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
  margin-bottom:14px;
}
.formgrid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:14px;
}
label {
  display:block;
}
input[type=number], input[type=text], select {
  width:100%;
  padding:11px;
  border:1px solid #cfcfcf;
  border-radius:12px;
  font-size:1rem;
  background:#fff;
}
.features {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:4px 20px;
}
.features-header,
.feat {
  display:grid;
  grid-template-columns:22px 1fr 60px;
  gap:8px;
  align-items:center;
}
.features-header {
  font-weight:800;
  border-bottom:2px solid #ddd;
  padding-bottom:7px;
  margin-bottom:8px;
}
.feat {
  min-height:29px;
  padding:2px 0;
  border-bottom:1px solid #f0f0f0;
  cursor:pointer;
}
.feat input {
  margin:0;
}
.feat[data-note]::after{
  content: attr(data-note);
  display:block;
  grid-column:2 / span 2;
  margin-top:2px;
  font-size:.75rem;
  color:#888;
  font-weight:400;
}
.price {
  text-align:right;
  font-weight:700;
  color:#555;
  font-variant-numeric:tabular-nums;
}

.addr-wrap {
  position:relative;
}
.suggestions {
  position:absolute;
  z-index:30;
  top:calc(100% + 4px);
  left:0;
  right:0;
  max-height:260px;
  overflow:auto;
  background:#fff;
  border:1px solid #cfcfcf;
  border-radius:12px;
  box-shadow:0 8px 24px rgba(0,0,0,.16);
  display:none;
}
.suggestion {
  padding:9px 11px;
  cursor:pointer;
  border-bottom:1px solid #f0f0f0;
}
.suggestion:hover,
.suggestion.active {
  background:#f7f7f7;
}
.suggestion b {
  color:var(--red);
}
.status {
  margin-top:6px;
  font-size:.86rem;
  color:var(--muted);
}
.error {
  color:var(--red);
  font-weight:700;
}

.result {
  position:sticky;
  top:10px;
  border-top:5px solid var(--red);
}
.big {
  font-size:1.25rem;
  color:var(--red);
  font-weight:750;
  margin:6px 0;
  text-align:center;
  line-height:1.25;
}
.result-title {
  text-align:center;
  font-weight:800;
  letter-spacing:.02em;
  margin:14px 0 8px;
}
.result-values {
  display:grid;
  grid-template-columns:1fr;
  gap:4px;
  padding:8px 0 10px;
  border-bottom:1px solid var(--line);
}
.result-box {
  background:#fafafa;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  margin:12px 0;
}
.result-box .label {
  text-align:center;
  color:var(--muted);
  font-size:.9rem;
  margin-top:8px;
}
.row {
  display:flex;
  justify-content:space-between;
  gap:12px;
  border-bottom:1px solid var(--line);
  padding:8px 0;
}
.small {
  font-size:.88rem;
  color:var(--muted);
  line-height:1.45;
}
button {
  background:var(--red);
  color:#fff;
  border:0;
  border-radius:12px;
  padding:10px 14px;
  cursor:pointer;
  font-weight:700;
}
button:hover {
  filter:brightness(.95);
}
@media(max-width:850px) {
  .grid { grid-template-columns:1fr; }
  .features { grid-template-columns:1fr; }
  .result { position:static; }
  .hero { align-items:center; }
  .wappen { width:92px; }
}
@media print {
  header, button { display:none; }
  body { background:#fff; }
  .wrap { max-width:none; padding:0; }
  .grid { grid-template-columns:1fr; }
  .card { box-shadow:none; border:1px solid #ddd; }
  .features { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>
<header>
  <div class="wrap hero">
    <div class="wappen"><img src="frankfurt-wappen.webp" alt="Frankfurter Wappen" loading="eager">
</div>
    <div>
      <h1>Frankfurter Mietspiegel 2026</h1>
      <div class="subtitle">Rechner zur Ermittlung der ortsüblichen Vergleichsmiete</div>
    </div>
  </div>
</header>

<main class="wrap grid">
  <section>
    <div class="card">
      <div class="formgrid">
        <div>
          <label for="area"><b>Wohnfläche</b> in m²</label>
          <input id="area" type="text" inputmode="decimal" value="100,52" min="15" max="234" step="0.01">
        </div>
        <div>
          <label for="lage"><b>Lagekategorie</b></label>
          <select id="lage"></select>
        </div>
        <div>
          <label for="addrSearch"><b>Adresse suchen</b> <span class="small">(optional)</span></label>
          <div class="addr-wrap">
            <input id="addrSearch" type="text" autocomplete="off" placeholder="z. B. Adalbertstraße 12a">
            <div id="addrSuggest" class="suggestions"></div>
          </div>
          <div id="addrStatus" class="status">Adresse wählen oder Lage manuell einstellen.</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="features-header">
        <span></span><span>Merkmal</span><span class="price">€/m²</span>
      </div>
      <div id="features" class="features"></div>
    </div>
  </section>

  <aside class="card result">
    <h2>Ergebnis</h2>
    <div id="out"></div>
    <p class="small">
      
    </p>
    <button onclick="createPDF()">Drucken / PDF</button>
  </aside>
</main>

<script>
const lage = {
  1:0, 2:.59, 3:.77, 4:1.06, 5:1.49,
  6:1.92, 7:2.46, 8:2.76, 9:4.68, 10:5.32
};

const feats = [
  ["Neubau 2018–2025",1.25],
  ["Gedämmtes Dach oder Bj. ≥ 1978",0.24],
  ["Gedämmte Außenwand",0.47],
  ["Wärmeschutzverglasung",0.38],
  ["Freistehendes Einfamilienhaus",2.22],
  ["Garten ≥ 30 m²",0.85],
  ["Deckenhöhe ≥ 2,61 m",0.21],
  ["Große Wohn-/Schlafräume",0.31],
  ["Gefangene Räume",-0.64],
  ["Grundrissänderung",0.95],
  ["Fehlender Fußboden",-0.60],
  ["Hochwertiger Fußboden",0.64],
  ["Hochwertiger Altbau",1.30],
  ["Auf-Putz-Leitungen",-0.27],
  ["Steigleitungen erneuert",0.37],
  ["Einfacher Heizungsstandard",-1.09],
  ["Nicht beheizbare Räume",-0.61],
  ["Bodentiefe oder raumhoe Fenster",0.29],
  ["Elektrische betriebene Rollläden",0.61],
  ["Videogegensprechanlage",0.82],
  ["Aufzug",0.65],
  ["Küche",0.43],
  ["Neue Einbauküche",0.85],
  ["Mehrere Badezimmer",0.61],
  ["Mehrere Toiletten",0.24],
  ["Wandhängendes WC",0.19],
  ["Bad-Heizung",0.45],
  ["Hochwertige Dusche",0.95],
  ["Tageslichtbad",0.19],
  ["Balkon/Freisitz",0.39],
  ["Tiefer Freisitz",0.38],
  ["Mehrere Freisitze",0.30]
];

const area = document.getElementById("area");
const lageSel = document.getElementById("lage");
const box = document.getElementById("features");
const addrSearch = document.getElementById("addrSearch");
const addrSuggest = document.getElementById("addrSuggest");
const addrStatus = document.getElementById("addrStatus");

let wohnlagen = {};
let streetNames = [];
let suggestionItems = [];
let activeSuggestion = -1;

for (let i=1; i<=10; i++) {
  const o = document.createElement("option");
  o.value = lage[i];
  o.textContent = "Lage " + i;
  if (i === 9) o.selected = true;
  lageSel.add(o);
}

const mutuallyExclusiveFeatures = [
  ["Hochwertiger Altbau", "Hochwertiger Fußboden"]
];

function featureIndex(name) {
  return feats.findIndex(f => f[0] === name);
}

function featureCheckbox(name) {
  const idx = featureIndex(name);
  return idx >= 0 ? document.getElementById("f" + idx) : null;
}

function updateMutualExclusions() {
  mutuallyExclusiveFeatures.forEach(([a,b]) => {
    const cbA = featureCheckbox(a);
    const cbB = featureCheckbox(b);
    if (!cbA || !cbB) return;
    const labelA = cbA.closest(".feat");
    const labelB = cbB.closest(".feat");

    if (cbA.checked) {
      cbB.checked = false;
      cbB.disabled = true;
      labelB.dataset.note = "Nicht kombinierbar mit Hochwertigem Altbau";
    } else {
      cbB.disabled = false;
      delete labelB.dataset.note;
    }

    if (cbB.checked) {
      cbA.checked = false;
      cbA.disabled = true;
      labelA.dataset.note = "Nicht kombinierbar mit hochwertigem Fußboden";
    } else {
      cbA.disabled = false;
      delete labelA.dataset.note;
    }
  });
}

feats.forEach((f,i) => {
  const label = document.createElement("label");
  label.className = "feat";
  label.innerHTML =
    `<input type="checkbox" id="f${i}">
     <span>${f[0]}</span>
     <span class="price">${f[1].toFixed(2).replace(".",",")}</span>`;
  box.appendChild(label);

  label.querySelector("input").addEventListener("change", () => {
    updateMutualExclusions();
  });
});

function parseDE(v) {
  return parseFloat(String(v).replace(",", ".")) || 0;
}

function baseRent(a) {
  return 6.5398988 + 173.8715515 / a;
}

function round2(x) {
  return Math.round((x + Number.EPSILON) * 100) / 100;
}

function euro(x) {
  return x.toLocaleString("de-DE", {minimumFractionDigits:2, maximumFractionDigits:2}) + " €";
}

function num(x) {
  return x.toLocaleString("de-DE", {minimumFractionDigits:2, maximumFractionDigits:2});
}


function normText(v) {
  return String(v || "")
    .toLocaleLowerCase("de-DE")
    .replace(/\s+/g, " ")
    .trim();
}

function normNr(v) {
  return String(v || "")
    .toLocaleLowerCase("de-DE")
    .replace(/\s+/g, "")
    .replace(/\./g, "")
    .trim();
}

function splitAddressQuery(q) {
  const s = String(q || "").trim().replace(/\s+/g, " ");
  const m = s.match(/^(.*?)(?:\s+)(\d+\s*[a-zA-Z]?)$/);
  if (!m) return {street:s, nr:""};
  return {street:m[1].trim(), nr:normNr(m[2])};
}

function setLageKategorie(kat, sourceText) {
  const idx = Math.max(1, Math.min(10, Number(kat))) - 1;
  lageSel.selectedIndex = idx;
  if (sourceText) addrStatus.innerHTML = sourceText;
  calc();
}

function hideSuggestions() {
  addrSuggest.style.display = "none";
  addrSuggest.innerHTML = "";
  suggestionItems = [];
  activeSuggestion = -1;
}

function renderSuggestions(items) {
  suggestionItems = items;
  activeSuggestion = -1;
  addrSuggest.innerHTML = "";
  if (!items.length) {
    hideSuggestions();
    return;
  }
  items.forEach((it, idx) => {
    const div = document.createElement("div");
    div.className = "suggestion";
    div.innerHTML = `${it.street} ${it.nr} <b>→ Lage ${it.lage}</b>`;
    div.addEventListener("mousedown", (e) => {
      e.preventDefault();
      chooseSuggestion(idx);
    });
    addrSuggest.appendChild(div);
  });
  addrSuggest.style.display = "block";
}

function chooseSuggestion(idx) {
  const it = suggestionItems[idx];
  if (!it) return;
  addrSearch.value = `${it.street} ${it.nr}`;
  hideSuggestions();
  setLageKategorie(it.lage, `Gewählte Adresse: <b>${it.street} ${it.nr}</b> → <b>Lage ${it.lage}</b>. Manuelle Änderung bleibt möglich.`);
  save();
}

function updateAddressSuggestions() {
  if (!streetNames.length) {
    addrStatus.textContent = "Adressdaten werden geladen …";
    return;
  }
  const raw = addrSearch.value.trim();
  if (raw.length < 2) {
    hideSuggestions();
    addrStatus.textContent = "Adresse wählen oder Lage manuell einstellen.";
    return;
  }

  const parsed = splitAddressQuery(raw);
  const qStreet = normText(parsed.street || raw);
  const qNr = normNr(parsed.nr);
  const candidates = [];

  const scoredStreets = streetNames
    .map(street => {
      const n = normText(street);
      let score = -1;
      if (n === qStreet) score = 0;
      else if (n.startsWith(qStreet)) score = 1;
      else if (n.includes(qStreet)) score = 2;
      return {street, score};
    })
    .filter(x => x.score >= 0)
    .sort((a,b) => a.score - b.score || a.street.localeCompare(b.street, "de-DE"))
    .slice(0, 18);

  for (const item of scoredStreets) {
    const nums = Object.keys(wohnlagen[item.street] || {});
    const matchedNums = qNr
      ? nums.filter(n => normNr(n).startsWith(qNr)).slice(0, 8)
      : nums.slice(0, 4);
    for (const nr of matchedNums) {
      candidates.push({street:item.street, nr, lage:wohnlagen[item.street][nr]});
      if (candidates.length >= 24) break;
    }
    if (candidates.length >= 24) break;
  }

  if (!candidates.length) {
    hideSuggestions();
    addrStatus.innerHTML = '<span class="error">Keine Adresse gefunden. Lage kann weiterhin manuell gewählt werden.</span>';
    return;
  }

  addrStatus.textContent = "Vorschlag auswählen oder Lage manuell einstellen.";
  renderSuggestions(candidates);
}

function loadWohnlagen() {
  fetch("wohnlagen_compact.json", {cache:"force-cache"})
    .then(r => {
      if (!r.ok) throw new Error("Adressdaten konnten nicht geladen werden");
      return r.json();
    })
    .then(data => {
      wohnlagen = data || {};
      streetNames = Object.keys(wohnlagen);
      addrStatus.textContent = "Adresssuche bereit. Adresse wählen oder Lage manuell einstellen.";
      updateAddressSuggestions();
    })
    .catch(() => {
      addrStatus.innerHTML = '<span class="error">Adresssuche nicht geladen. Manuelle Lageauswahl ist möglich.</span>';
    });
}

addrSearch.addEventListener("input", updateAddressSuggestions);
addrSearch.addEventListener("focus", updateAddressSuggestions);
addrSearch.addEventListener("keydown", (e) => {
  if (addrSuggest.style.display !== "block") return;
  const children = Array.from(addrSuggest.children);
  if (e.key === "ArrowDown") {
    e.preventDefault();
    activeSuggestion = Math.min(children.length - 1, activeSuggestion + 1);
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    activeSuggestion = Math.max(0, activeSuggestion - 1);
  } else if (e.key === "Enter") {
    if (activeSuggestion >= 0) {
      e.preventDefault();
      chooseSuggestion(activeSuggestion);
    }
    return;
  } else if (e.key === "Escape") {
    hideSuggestions();
    return;
  } else {
    return;
  }
  children.forEach((el,i) => el.classList.toggle("active", i === activeSuggestion));
});
document.addEventListener("click", (e) => {
  if (!e.target.closest(".addr-wrap")) hideSuggestions();
});
lageSel.addEventListener("change", () => {
  if (addrSearch.value.trim()) {
    addrStatus.textContent = "Lage wurde manuell geändert.";
  }
});

function save() {
  localStorage.setItem("ffm_mietspiegel_2026_final", JSON.stringify({
    area: area.value,
    lage: lageSel.selectedIndex,
    address: addrSearch.value,
    checks: feats.map((_,i) => document.getElementById("f"+i).checked)
  }));
}

function load() {
  try {
    const s = JSON.parse(localStorage.getItem("ffm_mietspiegel_2026_final") || "{}");
    if (s.area) area.value = s.area;
    if (s.address) addrSearch.value = s.address;
    if (Number.isInteger(s.lage)) lageSel.selectedIndex = s.lage;
    (s.checks || []).forEach((v,i) => {
      const el = document.getElementById("f"+i);
      if (el) el.checked = v;
    });
  } catch(e) {}
}

function calc() {
  updateMutualExclusions();
  if (!area.value.trim()) { document.getElementById("out").innerHTML = ""; return; }
  const areaNum = parseDE(area.value);
  if (!areaNum || areaNum < 15) {
    document.getElementById("out").innerHTML = '<div class="result-box"><b>Wohnfläche mindestens 15 m²</b></div>';
    save();
    return;
  }

  const a = areaNum;
  const basisExact = baseRent(a);
  const basisShown = round2(basisExact);

  const lagenzuschlag = round2(parseDE(lageSel.value));
  let merkmaleSum = 0;
  const active = [];

  feats.forEach((f,i) => {
    if (document.getElementById("f"+i).checked) {
      merkmaleSum += f[1];
      active.push(f[0]);
    }
  });

  merkmaleSum = round2(merkmaleSum);

  // Important: €/m² is rounded BEFORE multiplying by Wohnfläche.
  const pm2Shown = round2(basisExact + lagenzuschlag + merkmaleSum);
  const orts = round2(pm2Shown * a);
  const spanLow = round2(orts * 0.84);
  const spanHigh = round2(orts * 1.16);
  const mpb = round2(orts * 1.10);

  document.getElementById("out").innerHTML = `
    <div class="row"><span>Basis-Netto-Miete</span><b>${num(basisShown)} €/m²</b></div>
    <div class="row"><span>Lagenzuschlag</span><b>${num(lagenzuschlag)} €/m²</b></div>
    <div class="row"><span>Zu-/Abschläge</span><b>${num(merkmaleSum)} €/m²</b></div>

    <div class="result-title">ORTSÜBLICHE VERGLEICHSMIETE</div>
    <div class="result-values">
      <div class="big">${num(pm2Shown)} €/m²</div>
      <div class="big">${euro(orts)}</div>
    </div>

    <div class="result-box">
      <div class="result-title">MIETPREISBREMSE &amp; MIETSPIEGEL</div>
      <div class="label">Zulässige Höchstmiete</div>
      <div class="big">${euro(mpb)}</div>
      <div class="label">Mietspiegel-Spanne</div>
      <div class="big">${euro(spanLow)} – ${euro(spanHigh)}</div>
    </div>

    
  `;

  save();
}

load();
updateMutualExclusions();
loadWohnlagen();
document.addEventListener("input", calc);
document.addEventListener("change", calc);
calc();
</script>


<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script>
function createPDF(){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({orientation:"portrait", unit:"mm", format:"a4"});

  const a = parseDE(area.value);
  if (!a || a < 15) {
    alert("Bitte zuerst eine gültige Wohnfläche ab 15 m² eingeben.");
    return;
  }

  updateMutualExclusions();

  const basisExact = baseRent(a);
  const basisShown = round2(basisExact);
  const lagenzuschlag = round2(parseDE(lageSel.value));
  let merkmaleSum = 0;
  const active = [];

  feats.forEach((f,i) => {
    const el = document.getElementById("f"+i);
    if (el && el.checked) {
      merkmaleSum += f[1];
      active.push({name:f[0], value:f[1]});
    }
  });

  merkmaleSum = round2(merkmaleSum);
  const pm2Shown = round2(basisExact + lagenzuschlag + merkmaleSum);
  const orts = round2(pm2Shown * a);
  const spanLow = round2(orts * 0.84);
  const spanHigh = round2(orts * 1.16);
  const mpb = round2(orts * 1.10);

  const pageW = 210;
  const pageH = 297;
  const margin = 12;
  const red = [177,0,33];
  const dark = [35,35,35];
  const grey = [95,95,95];

  function euroPDF(x){ return euro(x); }
  function numPDF(x){ return num(x); }

  function text(txt,x,y,opt){
    pdf.text(String(txt), x, y, opt || {});
  }

  function line(y){
    pdf.setDrawColor(220,220,220);
    pdf.line(margin, y, pageW-margin, y);
  }

  function row(label, value, y){
    pdf.setFont("helvetica","normal");
    pdf.setTextColor(...dark);
    pdf.setFontSize(9);
    text(label, margin, y);
    pdf.setFont("helvetica","bold");
    text(value, pageW-margin, y, {align:"right"});
    line(y+2);
  }

  // Header
  pdf.setFillColor(...red);
  pdf.rect(0,0,pageW,24,"F");
  pdf.setTextColor(255,255,255);
  pdf.setFont("helvetica","bold");
  pdf.setFontSize(17);
  text("Frankfurter Mietspiegel 2026", margin, 10);
  pdf.setFont("helvetica","normal");
  pdf.setFontSize(9);
  text("Berechnung der ortsüblichen Vergleichsmiete", margin, 16);

  // Meta
  let y = 33;
  pdf.setTextColor(...dark);
  pdf.setFont("helvetica","bold");
  pdf.setFontSize(12);
  text("Berechnungsgrundlagen", margin, y);
  y += 7;

  const selectedLage = lageSel.options[lageSel.selectedIndex] ? lageSel.options[lageSel.selectedIndex].textContent : "";
  const adr = addrSearch.value.trim() || "nicht angegeben";

  row("Wohnfläche", numPDF(a) + " m²", y); y += 7;
  row("Lagekategorie", selectedLage + " / " + numPDF(lagenzuschlag) + " €/m²", y); y += 7;
  row("Adresse", adr, y); y += 9;

  // Main result box
  pdf.setFillColor(250,250,250);
  pdf.setDrawColor(210,210,210);
  pdf.roundedRect(margin, y, pageW - margin*2, 42, 3, 3, "FD");

  pdf.setTextColor(...red);
  pdf.setFont("helvetica","bold");
  pdf.setFontSize(10);
  text("ORTSÜBLICHE VERGLEICHSMIETE", pageW/2, y+8, {align:"center"});

  pdf.setFontSize(20);
  text(numPDF(pm2Shown) + " €/m²", pageW/2, y+21, {align:"center"});
  pdf.setFontSize(18);
  text(euroPDF(orts), pageW/2, y+34, {align:"center"});
  y += 51;

  // Calculation table
  pdf.setTextColor(...dark);
  pdf.setFont("helvetica","bold");
  pdf.setFontSize(12);
  text("Berechnung", margin, y);
  y += 7;

  row("Basis-Netto-Miete", numPDF(basisShown) + " €/m²", y); y += 7;
  row("Lagenzuschlag", numPDF(lagenzuschlag) + " €/m²", y); y += 7;
  row("Summe Zu-/Abschläge", numPDF(merkmaleSum) + " €/m²", y); y += 7;
  row("Gerundeter Wert", numPDF(pm2Shown) + " €/m²", y); y += 7;
  row("Monatsmiete", euroPDF(orts), y); y += 10;

  // Brake and range
  pdf.setFont("helvetica","bold");
  pdf.setFontSize(12);
  text("Mietpreisbremse & Mietspiegel-Spanne", margin, y);
  y += 7;

  row("Zulässige Höchstmiete (+10 %)", euroPDF(mpb), y); y += 7;
  row("Mietspiegel-Spanne (-16 % bis +16 %)", euroPDF(spanLow) + " bis " + euroPDF(spanHigh), y); y += 11;

  // Features
  pdf.setFont("helvetica","bold");
  pdf.setFontSize(12);
  text("Aktive Merkmale", margin, y);
  y += 6;

  pdf.setFont("helvetica","normal");
  pdf.setFontSize(7.6);
  pdf.setTextColor(...dark);

  if (!active.length) {
    text("Keine Merkmale ausgewählt.", margin, y);
    y += 5;
  } else {
    const colGap = 8;
    const colW = (pageW - margin*2 - colGap) / 2;
    const leftX = margin;
    const rightX = margin + colW + colGap;
    const startY = y;
    const rowH = active.length > 22 ? 4.2 : 4.8;
    const maxRows = Math.ceil(active.length / 2);

    active.forEach((it, idx) => {
      const inRight = idx >= maxRows;
      const localIdx = inRight ? idx - maxRows : idx;
      const x = inRight ? rightX : leftX;
      const yy = startY + localIdx * rowH;

      const val = (it.value >= 0 ? "+" : "") + numPDF(it.value) + " €/m²";
      let name = String(it.name)
        .replace(/≥/g, '>=')
        .replace(/≤/g, '<=')
        .replace(/[–—]/g, '-')
        .replace(/\s+/g, ' ')
        .trim();

      const maxChars = 42;
      if (name.length > maxChars) name = name.substring(0,maxChars-1) + '…';

      pdf.setFont('courier','normal');
      text(name, x, yy);
      pdf.setFont('courier','bold');
      text(val, x + colW, yy, {align:'right'});
    });

    y = startY + maxRows * rowH + 7;
  }

  text("Erstellt am " + new Date().toLocaleDateString("de-DE"), pageW-margin, 287, {align:"right"});

  pdf.save("Mietspiegel-Ergebnis.pdf");
}
</script>

</body>
</html>
